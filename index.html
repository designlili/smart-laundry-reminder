<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Laundry Reminder</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, #2d3a5a 0%, #161c2e 45%, #0c101a 100%);
      color: white;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      padding: 28px;
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #f4f7ff;
    }

    .subtitle {
      color: rgba(255,255,255,0.75);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .machine {
      width: 250px;
      height: 320px;
      margin: 0 auto 24px;
      border-radius: 28px;
      background: linear-gradient(180deg, #eef4ff 0%, #cfdcf3 100%);
      position: relative;
      box-shadow:
        inset 0 2px 8px rgba(255,255,255,0.5),
        0 20px 40px rgba(0,0,0,0.25);
    }

    .machine-top {
      height: 70px;
      border-radius: 28px 28px 0 0;
      background: linear-gradient(180deg, #f7fbff 0%, #dde8f8 100%);
      position: relative;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .display {
      width: 62px;
      height: 20px;
      border-radius: 8px;
      background: #1d2b49;
      position: absolute;
      top: 22px;
      left: 24px;
      box-shadow: inset 0 0 12px rgba(0, 255, 255, 0.25);
    }

    .knob {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffffff 0%, #c8d3e7 60%, #aeb9cc 100%);
      position: absolute;
      right: 24px;
      top: 14px;
      border: 2px solid #b4bfd2;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .knob:active {
      transform: scale(0.95);
    }

    .door {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      position: absolute;
      left: 50%;
      top: 125px;
      transform: translateX(-50%);
      background: radial-gradient(circle at center, #16243f 0%, #0f1a30 100%);
      border: 10px solid #dbe4f2;
      box-shadow:
        inset 0 0 25px rgba(255,255,255,0.08),
        0 8px 20px rgba(0,0,0,0.18);
      overflow: hidden;
    }

    .glass {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.05) 28%, transparent 30%),
        radial-gradient(circle at center, #20355d 0%, #132442 100%);
      overflow: hidden;
    }

    .drum {
      position: absolute;
      width: 110px;
      height: 110px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        conic-gradient(
          #ff6b6b 0deg,
          #ffd166 90deg,
          #7bdff2 180deg,
          #b388eb 270deg,
          #ff6b6b 360deg
        );
      opacity: 0.9;
      filter: saturate(1.1);
    }

    .drum::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(3px);
    }

    .spinning {
      animation: spin 1.1s linear infinite;
    }

    @keyframes spin {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    .status-box {
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      padding: 14px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.9);
      line-height: 1.5;
      font-size: 1rem;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 0.98rem;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .start-btn {
      background: #7bdff2;
      color: #12233d;
      font-weight: bold;
    }

    .finish-btn {
      background: #ffd166;
      color: #3b2a00;
      font-weight: bold;
    }

    .reset-btn {
      background: rgba(255,255,255,0.12);
      color: white;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
    }

    @media (max-width: 520px) {
      .app {
        padding: 22px 18px;
      }

      .machine {
        width: 220px;
        height: 295px;
      }

      .door {
        width: 150px;
        height: 150px;
        top: 118px;
      }

      .drum {
        width: 98px;
        height: 98px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>🧺 Smart Laundry</h1>
    <p class="subtitle">
      A playful laundry reminder with a little bit of charm.
    </p>

    <div class="machine">
      <div class="machine-top">
        <div class="display" id="display"></div>
        <div class="knob" id="knob" title="Finish now"></div>
      </div>

      <div class="door">
        <div class="glass">
          <div class="drum" id="drum"></div>
        </div>
      </div>
    </div>

    <div class="status-box" id="status">
      Ready to start the wash cycle.
    </div>

    <div class="buttons">
      <button class="start-btn" id="startBtn">Start wash</button>
      <button class="finish-btn" id="finishBtn">Finish now</button>
      <button class="reset-btn" id="resetBtn">Reset</button>
    </div>

    <div class="footer-note">
      Demo version: the cycle runs for 8 seconds.
    </div>
  </div>

  <script>
    const drum = document.getElementById("drum");
    const statusBox = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const finishBtn = document.getElementById("finishBtn");
    const resetBtn = document.getElementById("resetBtn");
    const knob = document.getElementById("knob");

    let washTimer = null;
    let isRunning = false;

    function setStatus(message) {
      statusBox.innerText = message;
    }

    function startWash() {
      if (isRunning) return;

      isRunning = true;
      drum.classList.add("spinning");
      setStatus("Wash cycle is running...");

      washTimer = setTimeout(() => {
        finishWash();
      }, 8000);
    }

    function finishWash() {
      if (!isRunning && washTimer === null) {
        setStatus("Waschgang fertig – wer hilft mit? 🧺✨");
        return;
      }

      clearTimeout(washTimer);
      washTimer = null;
      isRunning = false;
      drum.classList.remove("spinning");
      setStatus("Waschgang fertig – wer hilft mit? 🧺✨");
    }

    function resetWash() {
      clearTimeout(washTimer);
      washTimer = null;
      isRunning = false;
      drum.classList.remove("spinning");
      setStatus("Ready to start the wash cycle.");
    }

    startBtn.addEventListener("click", startWash);
    finishBtn.addEventListener("click", finishWash);
    resetBtn.addEventListener("click", resetWash);
    knob.addEventListener("click", finishWash);
  </script>
</body>
</html>
