<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Laundry Reminder</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, #3a537f 0%, #1a2744 42%, #0b1222 100%);
      color: white;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 760px;
    }

    .app {
      width: 100%;
      max-width: 580px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 34px;
      padding: 32px;
      text-align: center;
      backdrop-filter: blur(16px);
      box-shadow:
        0 28px 70px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    h1 {
      font-size: 2.05rem;
      margin-bottom: 10px;
      color: #f7faff;
      letter-spacing: 0.01em;
    }

    .subtitle {
      color: rgba(255,255,255,0.76);
      margin-bottom: 28px;
      line-height: 1.55;
      font-size: 1rem;
    }

    .machine {
      width: 310px;
      height: 390px;
      margin: 0 auto 24px;
      border-radius: 34px;
      background:
        linear-gradient(180deg, #f4f8ff 0%, #d5e0f1 50%, #c8d4e7 100%);
      position: relative;
      box-shadow:
        inset 0 2px 12px rgba(255,255,255,0.55),
        inset 0 -8px 18px rgba(100,120,150,0.08),
        0 26px 50px rgba(0,0,0,0.26);
    }

    .machine-top {
      height: 90px;
      border-radius: 34px 34px 0 0;
      background: linear-gradient(180deg, #fbfdff 0%, #e0e9f7 100%);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      position: relative;
    }

    .display {
      width: 112px;
      height: 36px;
      border-radius: 11px;
      background: linear-gradient(180deg, #112544 0%, #23436f 100%);
      position: absolute;
      top: 27px;
      left: 26px;
      box-shadow:
        inset 0 0 12px rgba(125, 255, 255, 0.22),
        0 0 16px rgba(80, 180, 255, 0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaf3ff;
      font-size: 0.92rem;
      letter-spacing: 0.05em;
      font-weight: bold;
    }

    .knob {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffffff 0%, #d9e2ef 58%, #b2bfd2 100%);
      position: absolute;
      top: 18px;
      right: 26px;
      border: 2px solid #b8c4d6;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      box-shadow:
        0 6px 14px rgba(0,0,0,0.12),
        inset 0 1px 2px rgba(255,255,255,0.6);
    }

    .knob:hover {
      box-shadow:
        0 0 20px rgba(100, 190, 255, 0.26),
        0 6px 14px rgba(0,0,0,0.12);
    }

    .knob:active {
      transform: scale(0.96);
    }

    .knob::after {
      content: "";
      width: 4px;
      height: 16px;
      border-radius: 2px;
      background: #6f829c;
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
    }

    .mini-buttons {
      position: absolute;
      top: 32px;
      left: 150px;
      display: flex;
      gap: 6px;
    }

    .mini-buttons span {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: inline-block;
      background: #bfcadd;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.35);
    }

    .door {
      width: 210px;
      height: 210px;
      border-radius: 50%;
      position: absolute;
      left: 50%;
      top: 136px;
      transform: translateX(-50%);
      background: radial-gradient(circle at center, #1c2c4c 0%, #0b1730 100%);
      border: 12px solid #e0e8f5;
      box-shadow:
        inset 0 0 28px rgba(255,255,255,0.08),
        0 12px 26px rgba(0,0,0,0.22);
      overflow: hidden;
    }

    .glass {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,0.36) 0%, rgba(255,255,255,0.06) 26%, transparent 28%),
        radial-gradient(circle at center, #24426d 0%, #122543 100%);
      overflow: hidden;
    }

    .water {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 75%, rgba(123, 223, 242, 0.22) 0%, rgba(123, 223, 242, 0.08) 36%, transparent 62%);
      pointer-events: none;
      z-index: 2;
    }

    .foam {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      box-shadow: inset 0 0 8px rgba(255,255,255,0.18);
    }

    .drum {
      position: absolute;
      width: 136px;
      height: 136px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.02) 56%, transparent 57%),
        radial-gradient(circle at center, #2d4f7f 0%, #15284a 100%);
      border: 2px solid rgba(255,255,255,0.08);
      z-index: 1;
      overflow: hidden;
    }

    .drum.spinning {
      animation: spin 1.08s linear infinite;
    }

    .laundry {
      position: absolute;
      border-radius: 50%;
      opacity: 0.9;
      filter: saturate(1.05);
    }

    .laundry.one {
      width: 56px;
      height: 56px;
      background: radial-gradient(circle at 30% 30%, #ff7a7a 0%, #ff4f74 100%);
      top: 18px;
      left: 22px;
    }

    .laundry.two {
      width: 48px;
      height: 48px;
      background: radial-gradient(circle at 30% 30%, #ffd166 0%, #ffb347 100%);
      bottom: 22px;
      left: 30px;
    }

    .laundry.three {
      width: 50px;
      height: 50px;
      background: radial-gradient(circle at 30% 30%, #7bdff2 0%, #59b8ff 100%);
      top: 36px;
      right: 18px;
    }

    .laundry.four {
      width: 40px;
      height: 40px;
      background: radial-gradient(circle at 30% 30%, #b388eb 0%, #8a63d2 100%);
      bottom: 24px;
      right: 26px;
    }

    .drum-highlight {
      position: absolute;
      inset: 15px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      z-index: 4;
      pointer-events: none;
    }

    .glass-reflection {
      position: absolute;
      width: 76px;
      height: 132px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.2), rgba(255,255,255,0.02));
      top: 10px;
      left: 20px;
      transform: rotate(-18deg);
      filter: blur(1px);
      z-index: 5;
      pointer-events: none;
    }

    @keyframes spin {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    .status-box {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      padding: 15px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.94);
      line-height: 1.5;
      font-size: 1rem;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 15px;
      padding: 12px 18px;
      font-size: 0.98rem;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .start-btn {
      background: #7bdff2;
      color: #102542;
      font-weight: bold;
      box-shadow: 0 0 18px rgba(123, 223, 242, 0.18);
    }

    .finish-btn {
      background: #ffd166;
      color: #3a2b02;
      font-weight: bold;
      box-shadow: 0 0 18px rgba(255, 209, 102, 0.18);
    }

    .reset-btn {
      background: rgba(255,255,255,0.12);
      color: white;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
    }

    @media (max-width: 520px) {
      .app {
        padding: 22px 18px;
      }

      .machine {
        width: 250px;
        height: 320px;
      }

      .machine-top {
        height: 78px;
      }

      .door {
        width: 170px;
        height: 170px;
        top: 122px;
      }

      .drum {
        width: 108px;
        height: 108px;
      }

      h1 {
        font-size: 1.7rem;
      }

      .display {
        width: 92px;
        height: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="app">
      <h1>🧺 Smart Laundry</h1>
      <p class="subtitle">
        A playful reminder app with a cleaner, more realistic washing machine and a spoken reminder when the cycle is done.
      </p>

      <div class="machine">
        <div class="machine-top">
          <div class="display" id="display">READY</div>
          <div class="mini-buttons">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="knob" id="knob" title="Finish now"></div>
        </div>

        <div class="door">
          <div class="glass">
            <div class="water"></div>

            <div class="drum" id="drum">
              <div class="laundry one"></div>
              <div class="laundry two"></div>
              <div class="laundry three"></div>
              <div class="laundry four"></div>
            </div>

            <div class="foam">
              <div class="bubble" style="width:16px;height:16px;left:30px;top:36px;"></div>
              <div class="bubble" style="width:10px;height:10px;left:60px;top:24px;"></div>
              <div class="bubble" style="width:14px;height:14px;right:34px;top:38px;"></div>
              <div class="bubble" style="width:12px;height:12px;right:62px;top:24px;"></div>
            </div>

            <div class="drum-highlight"></div>
            <div class="glass-reflection"></div>
          </div>
        </div>
      </div>

      <div class="status-box" id="status">
        Ready to start the wash cycle.
      </div>

      <div class="buttons">
        <button class="start-btn" id="startBtn">Start wash</button>
        <button class="finish-btn" id="finishBtn">Finish now</button>
        <button class="reset-btn" id="resetBtn">Reset</button>
      </div>

      <div class="footer-note">
        Demo version: the wash cycle runs for 8 seconds.
      </div>
    </div>
  </div>

  <script>
    const drum = document.getElementById("drum");
    const statusBox = document.getElementById("status");
    const display = document.getElementById("display");
    const startBtn = document.getElementById("startBtn");
    const finishBtn = document.getElementById("finishBtn");
    const resetBtn = document.getElementById("resetBtn");
    const knob = document.getElementById("knob");

    let washTimer = null;
    let countdownTimer = null;
    let isRunning = false;
    let secondsLeft = 8;
    let availableVoices = [];

    function setStatus(message) {
      statusBox.innerText = message;
    }

    function updateDisplay(text) {
      display.innerText = text;
    }

    function beep(duration = 180, frequency = 880, volume = 0.05) {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;

      const audioCtx = new AudioContextClass();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.type = "sine";
      oscillator.frequency.value = frequency;
      gainNode.gain.value = volume;

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.start();

      setTimeout(() => {
        oscillator.stop();
        audioCtx.close();
      }, duration);
    }

    function finishSound() {
      beep(140, 900, 0.05);
      setTimeout(() => beep(180, 1200, 0.05), 180);
    }

    function loadVoices() {
      availableVoices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    }

    function initSpeech() {
      if (!("speechSynthesis" in window)) return;

      loadVoices();

      try {
        const warmup = new SpeechSynthesisUtterance("");
        window.speechSynthesis.speak(warmup);
        window.speechSynthesis.cancel();
      } catch (err) {
        console.log("Speech init error:", err);
      }
    }

    function getBestGermanVoice() {
      if (!availableVoices || availableVoices.length === 0) return null;

      return (
        availableVoices.find(v => v.lang === "de-DE" && /female|anna|katja|helena|petra|siri|google/i.test(v.name)) ||
        availableVoices.find(v => v.lang === "de-DE") ||
        availableVoices.find(v => v.lang && v.lang.startsWith("de")) ||
        null
      );
    }

    function speakMessage(text) {
      if (!("speechSynthesis" in window)) return;

      const synth = window.speechSynthesis;
      synth.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "de-DE";
      utterance.pitch = 1.08;
      utterance.rate = 0.92;
      utterance.volume = 1;

      const selectedVoice = getBestGermanVoice();
      if (selectedVoice) {
        utterance.voice = selectedVoice;
      }

      synth.speak(utterance);
    }

    function startWash() {
      if (isRunning) return;

      initSpeech();
      isRunning = true;
      secondsLeft = 8;

      drum.classList.add("spinning");
      setStatus("Wash cycle is running...");
      updateDisplay(`${secondsLeft}s`);

      countdownTimer = setInterval(() => {
        secondsLeft -= 1;
        if (secondsLeft > 0) {
          updateDisplay(`${secondsLeft}s`);
        }
      }, 1000);

      washTimer = setTimeout(() => {
        finishWash();
      }, 8000);
    }

    function finishWash() {
      if (washTimer) {
        clearTimeout(washTimer);
        washTimer = null;
      }

      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }

      isRunning = false;
      drum.classList.remove("spinning");

      updateDisplay("DONE");
      setStatus("Waschgang fertig – Männer müssen auch mitmachen. 🧺✨");

      finishSound();

      setTimeout(() => {
        speakMessage("Waschgang fertig. Männer müssen auch mitmachen.");
      }, 400);
    }

    function resetWash() {
      if (washTimer) {
        clearTimeout(washTimer);
        washTimer = null;
      }

      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }

      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }

      isRunning = false;
      secondsLeft = 8;

      drum.classList.remove("spinning");
      updateDisplay("READY");
      setStatus("Ready to start the wash cycle.");
    }

    startBtn.addEventListener("click", startWash);
    finishBtn.addEventListener("click", () => {
      initSpeech();
      finishWash();
    });
    resetBtn.addEventListener("click", resetWash);
    knob.addEventListener("click", () => {
      initSpeech();
      finishWash();
    });

    loadVoices();
    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }
  </script>
</body>
</html>
